{% extends 'base.html' %}
{% block title %}Delete {{ card.name }}{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="form-panel text-center">

        <div style="font-size:56px;margin-bottom:16px;">⚠️</div>

        <h1 class="font-display fw-bold mb-3" style="font-size:26px;">Delete Card</h1>

        <p class="text-secondary mb-1">Are you sure you want to delete</p>
        <p class="fw-bold fs-5 mb-1">{{ card.name }}</p>
        {% if card.card_set %}
        <p class="text-muted small mb-4">{{ card.card_set.name }}</p>
        {% endif %}

        <div class="alert alert-danger py-2 mb-4">
          <i class="bi bi-exclamation-triangle"></i>
          This action cannot be undone.
        </div>

        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-3 justify-content-center">
            <a href="{{ card.get_absolute_url }}" class="btn btn-outline-secondary btn-lg px-4">Cancel</a>
            <button type="submit" class="btn btn-danger btn-lg px-4">
              <i class="bi bi-trash"></i> Yes, Delete
            </button>
          </div>
        </form>

      </div>
    </div>
  </div>
</div>
{% endblock %}
