{% extends 'base.html' %}
{% block title %}Change Password{% endblock %}
{% block content %}
<div class="container" style="max-width:680px;">
  <div class="page-header"><h1 class="page-title">Change Password</h1></div>
  <div class="info-section">
    <form method="post">{% csrf_token %}
      {% if form.non_field_errors %}<p class="page-meta" style="color:#ef4444;">{{ form.non_field_errors|striptags }}</p>{% endif %}
      <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:14px;">
        <label style="font-size:13px;font-weight:600;color:var(--text-secondary);" for="id_old_password">Current password</label>
        <input style="background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-primary);padding:11px 14px;border-radius:10px;font-size:15px;font-family:inherit;outline:none;width:100%;" type="password" name="old_password" required id="id_old_password">
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:14px;">
        <label style="font-size:13px;font-weight:600;color:var(--text-secondary);" for="id_new_password1">New password</label>
        <input style="background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-primary);padding:11px 14px;border-radius:10px;font-size:15px;font-family:inherit;outline:none;width:100%;" type="password" name="new_password1" required id="id_new_password1">
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <label style="font-size:13px;font-weight:600;color:var(--text-secondary);" for="id_new_password2">Confirm new password</label>
        <input style="background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-primary);padding:11px 14px;border-radius:10px;font-size:15px;font-family:inherit;outline:none;width:100%;" type="password" name="new_password2" required id="id_new_password2">
      </div>
      <div class="form-actions" style="margin-top:16px;"><button class="btn btn-primary" type="submit">Update password</button></div>
    </form>
  </div>
</div>
{% endblock %}
