{% extends 'base.html' %}
{% block title %}Change Password{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="bg-white border rounded-4 shadow-sm p-4 p-md-5">

        <div class="text-center mb-4">
          <div style="font-size:40px;">🔒</div>
          <h1 class="font-display fw-bold mt-2 mb-1" style="font-size:24px;">Change Password</h1>
          <p class="text-muted small">Enter your current and new password</p>
        </div>

        {% if form.non_field_errors %}
        <div class="alert alert-danger py-2 mb-3">
          <i class="bi bi-exclamation-triangle me-1"></i>
          {{ form.non_field_errors|striptags }}
        </div>
        {% endif %}

        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold" for="id_old_password">Current Password</label>
            <input class="form-control" type="password" name="old_password" required id="id_old_password">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold" for="id_new_password1">New Password</label>
            <input class="form-control" type="password" name="new_password1" required id="id_new_password1">
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold" for="id_new_password2">Confirm New Password</label>
            <input class="form-control" type="password" name="new_password2" required id="id_new_password2">
          </div>
          <button class="btn btn-primary w-100 py-2" type="submit">Update Password</button>
        </form>

        <hr class="my-4">
        <p class="text-center text-muted small mb-0">
          <a href="{% url 'cards:account' %}" class="text-accent fw-semibold">← Back to Account</a>
        </p>

      </div>
    </div>
  </div>
</div>
{% endblock %}
