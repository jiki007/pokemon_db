{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="bg-white border rounded-4 shadow-sm p-4 p-md-5">

        <!-- Logo -->
        <div class="text-center mb-4">
          <div style="font-family:var(--font-display);font-size:22px;font-weight:700;">
            ⚡ PokémonDB
          </div>
        </div>

        <!-- Title -->
        <h1 class="font-display fw-bold text-center mb-1" style="font-size:26px;">Welcome back</h1>
        <p class="text-muted text-center mb-4">Sign in to your account</p>

        {% if form.non_field_errors %}
        <div class="alert alert-danger py-2 mb-3">
          <i class="bi bi-exclamation-triangle me-1"></i>
          {{ form.non_field_errors|striptags }}
        </div>
        {% endif %}

        <form method="post">
          {% csrf_token %}

          <div class="mb-3">
            <label class="form-label fw-semibold" for="id_username">Username</label>
            <input class="form-control" type="text" name="username" id="id_username"
                   required autocomplete="username"
                   value="{{ form.username.value|default:'' }}">
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold" for="id_password">Password</label>
            <input class="form-control" type="password" name="password" id="id_password"
                   required autocomplete="current-password">
          </div>

          <button class="btn btn-primary w-100 py-2" type="submit">Sign in</button>
        </form>

        <hr class="my-4">
        <p class="text-center text-muted small mb-0">
          No account? <a href="{% url 'cards:signup' %}" class="text-accent fw-semibold">Create one</a>
        </p>

      </div>
    </div>
  </div>
</div>
{% endblock %}
