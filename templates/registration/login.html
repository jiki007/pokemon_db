{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">⚡ PokémonDB</div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Sign in to your account</p>

    {% if form.non_field_errors %}
      <div class="auth-error-banner">{{ form.non_field_errors|striptags }}</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-row">
        <label class="form-label" for="id_username">Username</label>
        <input class="form-input" type="text" name="username" id="id_username"
               required autocomplete="username"
               value="{{ form.username.value|default:'' }}">
      </div>
      <div class="form-row">
        <label class="form-label" for="id_password">Password</label>
        <input class="form-input" type="password" name="password" id="id_password"
               required autocomplete="current-password">
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" type="submit">Sign in</button>
      </div>
    </form>

    <div class="auth-divider"></div>
    <p class="auth-footer">No account? <a href="{% url 'cards:signup' %}">Create one</a></p>
  </div>
</div>
{% endblock %}
